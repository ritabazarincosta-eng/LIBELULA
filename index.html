<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

/* FUNDO PREMIUM */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;

    background: linear-gradient(135deg, #1a0933, #5a2e8c);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CAIXA LOGIN */
.container {
    width: 320px;
    padding: 30px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);

    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);

    text-align: center;
    color: white;
}

/* LOGO */
.logo img {
    width: 100px;
    height: 100px;
    object-fit: cover;

    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.5);

    margin-bottom: 15px;

    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* TÍTULO */
h2 {
    margin-bottom: 20px;
    color: #00d4ff;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;

    border-radius: 8px;
    border: none;

    background: rgba(255,255,255,0.1);
    color: white;

    outline: none;
}

/* PLACEHOLDER */
input::placeholder {
    color: #ccc;
}

/* FOCO */
input:focus {
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 10px rgba(0,212,255,0.5);
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;

    background: linear-gradient(45deg, #00d4ff, #0077ff);
    border: none;
    border-radius: 8px;

    color: white;
    font-weight: bold;
    cursor: pointer;

    transition: 0.3s;
}

/* HOVER */
button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px #00d4ff;
}

/* RODAPÉ */
.footer {
    position: fixed;
    bottom: 10px;
    right: 15px;

    color: rgba(255,255,255,0.6);
    font-size: 12px;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <img src="lobo.png" alt="Logo">
    </div>

    <h2>Login</h2>

    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">

    <button onclick="login()">Entrar</button>

</div>

<div class="footer">BY FABIO COSTA • lobofc_</div>

<script>
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "rita" && p === "Giovanna@20"){
        window.location.href = "home.html";
    } else {
        alert("Login inválido");
    }
}
</script>

</body>
</html>
