<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSULTA</title>
<style>

/* FUNDO */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;

    background:
        linear-gradient(rgba(20,20,40,0.85), rgba(20,20,40,0.85)),
        url("logo.png") no-repeat center;

    background-size: 600px;
    background-attachment: fixed;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 30px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);

    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);

    color: white;
}

/* TÍTULO */
h2 {
    text-align: center;
    color: #00d4ff;
}

/* BUSCA */
.search {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.search input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
}

.search button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: #00d4ff;
    cursor: pointer;
}

/* TABELA */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

th {
    color: #00d4ff;
}

/* RODAPÉ */
.footer {
    position: fixed;
    bottom: 10px;
    right: 15px;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

.modal-content {
    background: rgba(20,20,40,0.95);
    margin: 5% auto;
    padding: 25px;
    width: 600px;
    max-width: 90%;
    border-radius: 15px;
    color: white;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

.fechar {
    float: right;
    cursor: pointer;
    font-size: 20px;
}

.modal-content p {
    margin: 8px 0;
}

.acoes {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

.acoes button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00d4ff, #5a2e8c);
    color: white;
    cursor: pointer;
}
@media (max-width: 768px) {

    table, thead, tbody, th, td, tr {
        display: block;
    }

    thead {
        display: none;
    }

    tr {
        margin-bottom: 15px;
        background: rgba(255,255,255,0.08);
        padding: 10px;
        border-radius: 10px;
    }

    td {
        border: none;
        padding: 8px 0;
    }

    td:before {
        font-weight: bold;
        display: block;
        color: #00d4ff;
    }

    td:nth-child(1):before { content: "Nome"; }
    td:nth-child(2):before { content: "Idade"; }
    td:nth-child(3):before { content: "Motivo"; }
    td:nth-child(4):before { content: "Ações"; }
}
</style>
</head>

<body>

<div class="container">

<h2>Consulta de Cadastros</h2>

<div class="search">
    <input id="busca" placeholder="Buscar por nome...">
    <button onclick="buscar()">Buscar</button>
</div>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Idade</th>
<th>Motivo</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

</div>

<div class="footer">BY FABIO COSTA • lobofc_</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <span class="fechar" onclick="fecharModal()">✖</span>

    <h2>Ficha do Cliente</h2>

    <div id="conteudoModal"></div>

    <div class="acoes">
      <button onclick="editarAtual()">✏️ Editar</button>
      <button onclick="fecharModal()">Fechar</button>
    </div>

  </div>
</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycby7U6ppM26VDbg6wyVB9VPxOKo_lwcaDP-0E4NSBXkpX8zeRUM1XXuuMAsl1bh5XIM0/exec";

let idAtual = null;

// 🔥 CARREGAR
function carregar(){
    fetch(scriptURL)
    .then(res => res.json())
    .then(data => montarTabela(data));
}

// 🔍 BUSCAR
function buscar(){
    let nome = document.getElementById("busca").value.trim();

    if(nome === ""){
        carregar();
        return;
    }

    fetch(`${scriptURL}?nome=${nome}`)
    .then(res => res.json())
    .then(data => montarTabela(data));
}

// 📋 TABELA
function montarTabela(data){
    let html = "";

    data.forEach(item => {
        html += `
        <tr>
            <td>${item.nome_cliente}</td>
            <td>${item.idade}</td>
            <td>${item.motivo_atendimento}</td>
            <td>
                <span onclick="ver(${item.id})" style="cursor:pointer;">👁️</span>
                &nbsp;
                <span onclick="editar(${item.id})" style="cursor:pointer;">✏️</span>
            </td>
        </tr>
        `;
    });

    document.getElementById("tabela").innerHTML = html;
}

// 👁️ VISUALIZAR
async function ver(id){

    idAtual = id;

    let res = await fetch(`${scriptURL}?id=${id}`);
    let d = await res.json();

    let html = `
    <p><b>Nome:</b> ${d.nome_cliente}</p>
    <p><b>Nascimento:</b> ${d.data_nascimento}</p>
    <p><b>Idade:</b> ${d.idade}</p>

    <p><b>Motivo:</b><br>${d.motivo_atendimento}</p>

    <p><b>Doença:</b> ${d.doenca_cronica}</p>
    <p><b>Vício:</b> ${d.vicio_compulsao}</p>

    <p><b>Tratamento:</b> ${d.tratamento_atual}</p>
    <p><b>Início:</b> ${d.inicio_tratamento}</p>
    <p><b>Término:</b> ${d.termino_tratamento}</p>
    <p><b>Duração:</b> ${d.duracao_tratamento}</p>

    <p><b>Mesas:</b> ${d.mesas_utilizadas}</p>

    <p><b>Sugestões:</b><br>${d.sugestoes_finais}</p>
    `;

    document.getElementById("conteudoModal").innerHTML = html;
    document.getElementById("modal").style.display = "block";
}

// ❌ FECHAR
function fecharModal(){
    document.getElementById("modal").style.display = "none";
}

// ✏️ EDITAR
async function editar(id){

    let res = await fetch(`${scriptURL}?id=${id}`);
    let dados = await res.json();

    let nome = prompt("Nome:", dados.nome_cliente);
    let data = prompt("Data nascimento:", dados.data_nascimento);
    let idade = prompt("Idade:", dados.idade);
    let motivo = prompt("Motivo:", dados.motivo_atendimento);

    if(!nome) return;

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({
            acao: "editar",
            id: id,
            nome_cliente: nome,
            data_nascimento: data,
            idade: idade,
            motivo_atendimento: motivo
        })
    })
    .then(() => {
        alert("Atualizado!");
        carregar();
    });
}

// EDITAR PELO MODAL
function editarAtual(){
    fecharModal();
    editar(idAtual);
}

// FECHAR CLICANDO FORA
window.onclick = function(event) {
    let modal = document.getElementById("modal");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}

// 🚀 INICIAR
carregar();

</script>

</body>
</html>
